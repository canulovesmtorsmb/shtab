ора, любит содержательные разговоры и уважает людей, которые действительно интересны как личности и умеют мыслить нестандартно.\n\nПроблема сейчас в том, что практически полностью перестал читать на русском языке. До 12 лет словарный запас и уровень речи были значительно выше сверстников, а сейчас русский остается только языком общения дома. Дополнительно русским языком не занимается.\n\nГлавная задача — не «подтянуть программу» и не готовить к экзаменам, а вовлечь в чтение, найти книги и темы, которые действительно его зацепят. Очень хочется, чтобы он не прошел мимо произведений, за которые русскую литературу и культуру ценят во всем мире, и прочитал их именно на родном языке — с пониманием, интересом и удовольствием.\n\nПри этом важно:\n— без давления и школьного формализма;\n— без зубрежки правил;\n— с уважением к личности подростка;\n— через живой диалог, юмор, обсуждения, интересные параллели и смыслы.\n\nСейчас нагрузка в школе высокая, поэтому на первом этапе видим формат примерно 1 раз в неделю, в достаточно легком ритме, с домашним чтением между занятиями. Летом времени будет больше — ориентировочно со второй половины июня можно добавить работу с письменным русским языком и грамотностью.\n\nНужен именно интересный педагог, который умеет увлечь чтением и литературой, а не просто вести занятия по школьной программе. Возможно, это будет человек с широким кругозором, хорошим чувством юмора и умением находить общий язык с интеллектуальными подростками.", "created": 1779904795609}, {"id": "7c8128f6-78", "name": "Росвита", "subject": "РКИ", "rate": 1500, "color": "pink", "contact": "", "parentContact": "", "notes": "", "created": 1779956686682}, {"id": "02b3d897-bc", "name": "Павел", "subject": "Русский язык", "rate": 1500, "color": "grape", "contact": "", "parentContact": "", "notes": "Сочинение, речь, изложение мыслей, деловая переписка", "created": 1779969714951}, {"id": "dab857cc-2b", "name": "Росвита", "subject": "РКИ", "rate": 1500, "color": "pink", "contact ["Анти-ИИ переписывание","Перепиши приведённый ниже текст так, чтобы он читался как работа живого человека, эксперта в теме, и не определялся как сгенерированный нейросетью.\n\nКОНТЕКСТ И ЦЕЛЬ\nТекст должен сохранить весь смысл, факты, термины и логику, но звучать естественно, с человеческим ритмом и интонацией. Итог пойдёт в работу, где машинный стиль недопустим.\n\nЧТО СДЕЛАТЬ\n1. Ритм и длина: чередуй короткие и длинные предложения, ломай монотонность, избегай одинаковых конструкций и одинаковых зачинов подряд.\n2. Убери типичные маркеры ИИ: шаблонные связки и клише (таким образом, важно отметить, в современном мире, играет ключевую роль, в заключение стоит сказать), избыточную симметрию абзацев, перечисления через равные обороты, вводные-пустышки.\n3. Замени канцелярит и водность на живую, точную речь; там где уместно, добавь конкретику вместо общих слов.\n4. Сохрани все факты, цифры, имена, определения и термины без искажений. Ничего не добавляй от себя и ничего не выдумывай: ни источников, ни статистики, ни примеров, которых не было.\n5. Сохрани исходный регистр и стиль (научный, деловой, разговорный) и примерный объём.\n\nЖЁСТКИЕ ПРАВИЛА ОФОРМЛЕНИЯ\n- Никаких длинных тире. Только короткое тире «–».\n- Не используй среднюю точку как разделитель. Разделяй запятой, «/», «|» или пробелом.\n- Без эмодзи.\n\nФОРМАТ ОТВЕТА\nВерни только переписанный текст, без предисловий, пояснений и комментариев.\n\nТекст:\n{текст}"],
["ВКР: введение, актуальность и значимость","Помоги написать ключевые смысловые блоки введения для выпускной квалификационной работы по теме «{тема}» (направление/специальность: {направление}).\n\nЧТО НУЖНО СОБРАТЬ (каждый блок отдельным заголовком)\n1. Актуальность темы: 5–8 предложений. Покажи, почему тема важна именно сейчас, какие процессы в отрасли, праве, обществе или практике её обостряют. Опирайся на общеизвестные тенденции, без выдуманных цифр.\n2. Социальная значимость: 4–6 предложений. Какую реальную проблему общества, отрасли или конкретной группы людей затрагивает тема и что даёт её решение. Это обязательный для введения блок.\n3. Степень разработанности: 3–5 предложений в общем виде, с указанием, что тему изучали отечественные и зарубежные авторы (без выдумывания конкретных фамилий и работ; оставь места в квадратных скобках для подстановки реальных источников).\n4. Проблема, объект и предмет: чёткие формулировки (объект – широкое поле, предмет – узкий срез внутри объекта).\n5. Цель и задачи: одна ясная цель и 4–6 задач в форме инфинитивов. Помни принцип «одна задача – один параграф».\n6. Практическая значимость: 3–4 предложения, где и кому результаты могут пригодиться.\n\nТРЕБОВАНИЯ К СТИЛЮ И ДОСТОВЕРНОСТИ\n- Академический, но живой язык без воды и канцелярита.\n- Категорически не выдумывай источники, нормативные акты, статистику, проценты, авторов и факты. Если нужна цифра или ссылка, оставь подстановку в квадратных скобках.\n- Учитывай требования ГОСТ к академическому стилю.\n\nЖЁСТКИЕ ПРАВИЛА ОФОРМЛЕНИЯ\n- Только короткое тире «–», без длинных тире.\n- Не используй среднюю точку как разделитель.\n\nФОРМАТ ОТВЕТА\nГотовые блоки под своими заголовками, пригодные для вставки во введение."],
["Защита: вопросы комиссии и подготовка","Подготовь меня к защите работы по теме «{тема}» (тип работы: {тип}, например ВКР, курсовая, диплом).\n\n1. ВЕРОЯТНЫЕ ВОПРОСЫ\nДай 12 наиболее вероятных вопросов государственной/аттестационной комиссии, распределив их по категориям:\n- по теории и понятийному аппарату;\n- по методологии и выбранным методам;\n- по практической части, расчётам и результатам;\n- по научной/практической новизне и значимости;\n- по источникам и достоверности данных;\n- каверзные вопросы на понимание и на слабые места.\nК каждому вопросу дай сильный, уверенный ответ на 2–4 предложения, который показывает, что автор глубоко разбирается в работе. Где нужен конкретный показатель из моей работы, оставь подстановку в квадратных скобках, не выдумывай цифры.\n\n2. СЛАБЫЕ МЕСТА\nНазови 3–4 вероятных уязвимых места такой работы и как корректно их защитить, если комиссия надавит.\n\n3. РЕЧЬ НА ЗАЩИТУ\nДай каркас выступления на 3–4 минуты: приветствие, актуальность, цель и задачи, что сделано, ключевые результаты, выводы, практическая значимость, благодарность. Кратко, по делу, без воды.\n\nПРАВИЛА\n- Не выдумывай факты, источники и цифры; для подстановок используй квадратные скобки.\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя."],
["Идеи для Shorts/Reels (детально)","Придумай 7 идей коротких вертикальных видео по теме «{тема}» для площадки {площадка}. Аудитория: {аудитория}. Цель: {цель, например рост охватов, продажи, подписки}.\n\nИдеи должны быть РАЗНЫМИ по формату и подаче, без повторов схемы. Используй разные типы: разбор ошибки, лайфхак, личная история или провал, мини-гайд за 30 секунд, миф против факта, до и после, провокационный вопрос, реакция на тренд.\n\nДЛЯ КАЖДОЙ ИДЕИ ДАЙ:\n1. Рабочее название идеи.\n2. Хук на первую секунду (конкретная фраза или действие, которое останавливает пролистывание; без штампов).\n3. Сценарий по секундам: 0–3 сек хук, 3–15 сек удержание и польза, финал и призыв к действию.\n4. Что в кадре: визуал, текст на экране, монтажные акценты.\n5. Идея обложки и заголовка.\n6. Почему это сработает (на каком триггере: любопытство, выгода, эмоция, спор).\n7. 3–5 релевантных хэштега.\n\nТРЕБОВАНИЯ\n- Хуки должны быть разными между собой и привязанными именно к этой теме, а не универсальными шаблонами.\n- Живой человеческий язык, без канцелярита.\n- Не выдумывай несуществующие факты и кейсы.\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя."],
["План урока (подробный)","Составь подробный план занятия.\nНаправление: {направление}. Тема: «{тема}». Уровень ученика: {уровень}. Длительность: {минуты, например 60} минут. Формат: {онлайн/очно}.\n\n1. ЦЕЛИ И РЕЗУЛЬТАТЫ\n- Образовательная цель занятия одним предложением.\n- 3–4 измеримых результата: что ученик будет уметь после урока.\n\n2. МАТЕРИАЛЫ\nЧто подготовить заранее (карточки, тренажёр, презентация, тексты, примеры).\n\n3. ХОД УРОКА С ТАЙМИНГОМ\nРазбей на блоки с минутами: организационный момент, разминка или повторение, объяснение нового, разбор примеров, самостоятельная практика ученика, проверка понимания, рефлексия и итог. Для каждого блока укажи отдельно, что делает преподаватель и что делает ученик.\n\n4. ПРИМЕРЫ И ЗАДАНИЯ\n2–3 конкретных примера или упражнения по теме с краткими решениями.\n\n5. ТИПИЧНЫЕ ОШИБКИ\n3–4 частые ошибки учеников по этой теме и как их предупредить.\n\n6. ДИФФЕРЕНЦИАЦИЯ\nКак упростить для слабого ученика и усложнить для сильного.\n\n7. ДОМАШНЕЕ ЗАДАНИЕ\nКонкретное задание с критерием выполнения.\n\n8. КРИТЕРИИ УСПЕХА\nКак понять, что цель урока достигнута.\n\nПРАВИЛА\n- Реальные, выполнимые задания, ничего не выдумывай про несуществующие пособия.\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя."],
["Письмо клиенту по заказу (максимально детально)","Помоги написать сообщение клиенту по заказу «{тема}» (площадка переписки: {канал, например мессенджер, почта}).\nЦель письма: {цель}. Контекст и факты: {что сделано, что нужно, сроки, нюансы}.\n\nДай 2–3 ВАРИАНТА сообщения под разные стратегии, с короткими подписями-ярлыками, чтобы я выбрал по ситуации. Уместные стратегии в зависимости от цели:\n- статус и спокойное информирование;\n- сдача этапа и запрос обратной связи;\n- мягкий перенос срока с объяснением и новой датой;\n- ответ на правки клиента;\n- предложение дополнительной работы или апселл;\n- напоминание об оплате.\n\nДЛЯ КАЖДОГО ВАРИАНТА СОБЛЮДАЙ СТРУКТУРУ:\n1. Короткое уважительное приветствие.\n2. Суть: что сделано или что происходит, конкретно и без воды.\n3. Чёткий запрос: что именно нужно от клиента и к какому сроку.\n4. Следующий шаг и дедлайн.\n5. Спокойное закрытие.\n\nТОН И ПРИНЦИПЫ\n- Уверенно, доброжелательно, профессионально. Без лишних извинений, без заискивания и без канцелярита.\n- Конкретика по срокам и действиям, никаких размытых формулировок.\n- Не выдумывай факты о заказе сверх данного контекста; недостающее оставь подстановкой в квадратных скобках.\n\nОФОРМЛЕНИЕ\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя."],
["Отчёт родителю об успехах ученика","Напиши родителю сообщение об успехах ученика {имя} по итогам занятий.\nОснова: {детали занятий, темы, прогресс, сложности, оценки}.\n\nТРЕБОВАНИЯ\n- 6–9 предложений, тёплый, но деловой тон.\n- Структура: что уже хорошо получается, над чем работаем сейчас, что стоит подтянуть дома, ближайший план.\n- Без обесценивания и без излишнего негатива, но честно.\n- Не выдумывай достижения и проблемы сверх данного контекста.\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя.\n\nФОРМАТ\nВерни готовое сообщение, пригодное для отправки в мессенджер."],
["Рерайт под антиплагиат","Перепиши научный фрагмент так, чтобы повысить оригинальность и убрать машинный стиль, полностью сохранив научный смысл и терминологию.\n\nТЕХНИКИ\n- Переформулируй конструкции своими словами, меняй синтаксис и порядок мыслей.\n- Объединяй и разделяй предложения, меняй залог, заменяй шаблонные обороты.\n- Сохраняй точность определений, терминов, формул, имён и фактов.\n\nОГРАНИЧЕНИЯ\n- Не добавляй новых утверждений и не выдумывай источники, цифры и данные.\n- Не упрощай смысл до искажения и не теряй детали.\n- Только короткое тире «–», без длинных тире, без средней точки как разделителя.\n\nФОРМАТ\nВерни только переписанный фрагмент, без комментариев.\n\nФрагмент:\n{текст}"]
];

  if(e.key==="/"){e.preventDefault();var s2=document.getElementById("search");if(s2)s2.focus();return;}
  if(e.key>="1"&&e.key<="9"){var idx=+e.key-1;if(GROUPS[idx]){goGroup(GROUPS[idx].id);}return;}
  if(e.key==="n"||e.key==="т"){var b=document.getElementById("btn-add");if(b&&b.style.visibility!=="hidden")b.click();return;}
  if(e.key==="b"||e.key==="и"){exportDB();return;}}
boot();
</script>
